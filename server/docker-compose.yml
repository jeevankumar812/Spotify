services:

  # -------------------------
  # MongoDB Replica Set Nodes
  # -------------------------

  mongo1:
    image: mongo:6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo1-data:/data/db
    networks:
      - spotify-network

  mongo2:
    image: mongo:6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo2-data:/data/db
    networks:
      - spotify-network

  mongo3:
    image: mongo:6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo3-data:/data/db
    networks:
      - spotify-network


  # -------------------------
  # RabbitMQ
  # -------------------------

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - spotify-network


  # -------------------------
  # Redis
  # -------------------------

  redis:
    image: redis:7
    networks:
      - spotify-network


  # -------------------------
  # Microservices
  # -------------------------

  user-service:
    build: ./services/user-service
    depends_on:
      - mongo1
      - rabbitmq
    env_file:
      - ./services/user-service/.env
    networks:
      - spotify-network

  streaming-service:
    build: ./services/streaming-service
    depends_on:
      - mongo1
      - rabbitmq
    env_file:
      - ./services/streaming-service/.env
    networks:
      - spotify-network

  ad-service:
    build: ./services/ad-service
    depends_on:
      - mongo1
      - rabbitmq
    env_file:
      - ./services/ad-service/.env
    networks:
      - spotify-network

  search-service:
    build: ./services/search-service
    depends_on:
      - mongo1
    env_file:
      - ./services/search-service/.env
    networks:
      - spotify-network

  recommendation-service:
    build: ./services/recommendation-service
    depends_on:
      - mongo1
    env_file:
      - ./services/recommendation-service/.env
    networks:
      - spotify-network

  analytics-service:
    build: ./services/analytics-service
    depends_on:
      - mongo1
      - rabbitmq
      - redis
    env_file:
      - ./services/analytics-service/.env
    networks:
      - spotify-network


  # -------------------------
  # API Gateway (NO PUBLIC PORT)
  # -------------------------

  api-gateway:
    build: ./api-gateway
    depends_on:
      - user-service
      - streaming-service
      - ad-service
      - search-service
      - recommendation-service
      - analytics-service
    networks:
      - spotify-network


  # -------------------------
  # NGINX Load Balancer
  # -------------------------

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway
    networks:
      - spotify-network


volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:

networks:
  spotify-network:
    driver: bridge